{% if article %}
    <div class="px-2  py-3 md:w-1/3 sm:mb-0 mb-6 bg-white">
        <div class="rounded-sm  h-64 overflow-hidden">
          {% if article.thumbnail %}
            <img alt="content" class="object-cover object-center h-full w-full" src="{{article.get_thumbnail}}">
          {% else %}
            <img class="object-center h-full w-full" src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&amp;fit=crop&amp;q=80&amp;w=1160" alt="{{highlighted_article.title}}" />
          {% endif %}
        </div>
        
        <h2 class="text-sm uppercase font-semibold title-font text-black mt-2 ">{{article.title}}</h2>
        
        <div class=" flex flex-row items-center justify-between py-1">
          <div class="flex flex-row items-center">
            <span class="text-xs italic">Published:</span> <p class="text-xs ml-1 text-gray-700 font-semibold">{{article.created_at}}</p>
          </div>
        </div>
        <p class="text-sm leading-relaxed mt-2">{{article.body|truncatewords:30}}</p>
        <a href="" class="text-blue-500 font-medium text-xs inline-flex items-center">Read More
          <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-4 h-4 ml-2" viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>
        </a>
    </div>
{% else %}
    <div class="container text-center items-center">
      <div class="row">
        <div class="m-auto">
          <div class=" mt-2 mb-2">
            <h2 class="font-semibold">No results</h2>
            <p class="card-text">There were no results matching the search: " 
              <strong class="italic tracking-wide">{{query}}</strong>"
            </p>
          </div>
        </div>
      </div>
    </div>
{% endif %}
