{% load static %}
<main class="">
    <div class="mb-4 md:mb-0 w-full  mx-auto relative" style="height: 30em;">
      <div class="absolute left-0 bottom-0 w-full h-full z-10" style="background-image: linear-gradient(180deg,transparent,rgba(0,0,0,.7));"></div>
          {% if article.get_article_banner_image %}
              <img src="{{article.get_article_banner_image}}" class="absolute left-0 top-0 w-full h-full z-0 object-center" />
                  {% else %}
              <img class="object-center h-full w-full" src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&amp;fit=crop&amp;q=80&amp;w=1160" alt="{{highlighted_article.title}}" />
          {% endif %}
          <div class="p-4 absolute bottom-0 left-0 z-20">
            <h2 href="#" class="px-4 py-1 bg-blue-400 text-white inline-flex items-center justify-center mb-2">{{article.chapter}}</h2>
            <h2 class="text-2xl uppercase font-semibold text-white leading-tight">
              {{article.title}}
            </h2>
            <div class="flex mt-3">
              <img src="https://randomuser.me/api/portraits/men/97.jpg"
                class="h-10 w-10 rounded-full mr-2 object-cover" />
              <div>
                {% if article.author %}
                  <p class="font-semibold text-white text-sm"> {{article.author.username}}</p>
                {% else %}
                  <p class="font-semibold text-white text-sm"> Admin</p>
                {% endif %}
                
                <p class="font-semibold text-white text-xs"> {{article.created_at}} </p>
              </div>
            </div>
          </div>
        </div>

        <div class="px-4 lg:px-0 mt-12 text-black max-w-5xl mx-auto text-lg leading-relaxed">
          <p class="pb-6 text-justify">
            {{article.body}}
          </p>
          <div class="border-l-4 border-gray-500 pl-4 mb-6 italic rounded">
            {{article.quote}}
          </div>
        </div>
</main>
<!-- main ends here -->
